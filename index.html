<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Js Website</title>
    <style>
        h2{
            color: red;
        } 
        .btn{
            background-color: green;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;

        }
        .navbar{
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: green;
            padding: 10px;
        }
        a{
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        form{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            width: 500px;
            background-color: gray;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
        }
        form h3{
            text-align: center;
            color: black;
            font-size: 24px;
        }
        form div{
            display: flex;
            flex-direction: row;
            margin-bottom: 15px;
            gap: 20px;
            align-items: center;
        }
        form div label{
            font-size: 18px;
            font-weight: bold;
        }
         form div input{
            border: 1px solid green;
            width: 300px;
            padding: 8px;
        } 
        form button{
            background-color: rgb(13, 61, 13);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="./login.html">Login</a>

    </nav>

    <h2>Hello Welcome to Javascript</h2>



    <button class="btn">Login</button>


    <!-- Table -->
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>30</td>
                <td>john@example.com</td>
            </tr>
                <tr>
                    <td>Jane Doe</td>
                    <td>25</td>
                    <td>jane@example.com</td>
                </tr>
        </tbody>
</table>
     <!-- Form -->
      <form>
        <h3>Get Started Here</h3>
        <div>
        <label>User Name</label>
        <input type="text" placeholder="Enter your name">
        </div>
        <div>
        <label>User Email</label>
        <input type="email" placeholder="Enter your email">
        </div>
        <div>
        <label>User Password</label>
        <input type="password" placeholder="Enter your password">
        </div>
        <button type="submit">Register</button>
      </form>
      <!-- Card -->

</body>
</html>
